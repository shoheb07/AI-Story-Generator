<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Story Generator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>AI Story Generator</h1>

    <div class="card">

        <input type="text"
               id="prompt"
               placeholder="Enter story topic">

        <button onclick="generateStory()">
            Generate Story
        </button>

        <div class="story-box">

            <p id="story">
                Your story will appear here...
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
